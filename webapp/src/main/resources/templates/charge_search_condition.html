<!DOCTYPE html>
<html th:replace="~{layout/app :: layout('料金検索', ~{::content}, 'member')}" xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:fragment="content">
  <!--/*料金情報検索画面*/-->
  <form th:action="@{/charge/search}" th:object="${chargeSearchCondition}" method="POST">
    <!--/*料金名*/-->
    <div class="form-group">
      <label for="name">料金名</label>
      <input type="text" th:field="*{name}" />
    </div>
    <!--/*テキストフォーム*/-->
    <div class="button-group">
      <button type="submit" id="search">検索</button>
      <a role="button" class="outline" id="addAccount" th:href="@{/charge/add}">登録</a>
    </div>
  </form>
</div>

</html>
